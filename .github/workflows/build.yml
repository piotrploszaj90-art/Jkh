name: Build ESP32
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      - run: |
          arduino-cli core install esp32:esp32
          arduino-cli lib install "WiFiManager"
          mkdir -p sketch/sketch
          cp *.ino sketch/sketch/ 2>/dev/null || cp Jkh/*.ino sketch/sketch/ 2>/dev/null || true
          ls -la
          ls -la sketch/sketch/
          mkdir build
          arduino-cli compile --fqbn esp32:esp32:esp32 --output-dir build sketch/sketch
      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/*.bin
